name: Messenger E2E

on:
  pull_request:
    branches: [Dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  messenger:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      E2E_DB_HOST: 127.0.0.1
      E2E_DB_PORT: "3306"
      E2E_DB_NAME: polaris_e2e
      E2E_DB_USER: root
      E2E_DB_PASSWORD: root
      E2E_SSO_TICKET: e2e-reconnect-ticket
      E2E_SECOND_SSO_TICKET: e2e-messenger-peer-ticket
      E2E_USER_ID: "900001"
      E2E_SECOND_USER_ID: "900003"
      E2E_ROOM_ID: "900002"
      E2E_GAME_PORT: "31999"
      E2E_RAW_PORT: "31998"
      E2E_RCON_PORT: "32000"
      E2E_WS_URL: ws://127.0.0.1:31999
      E2E_PROBE_URL: http://127.0.0.1:31999/__e2e
      E2E_RUNTIME_DIR: /tmp/polaris-e2e
    steps:
      - name: Checkout renderer
        uses: actions/checkout@v7

      - name: Resolve companion emulator branch
        shell: bash
        run: |
          stem="${GITHUB_HEAD_REF%-renderer}"
          branch="${stem}-emulator"
          if git ls-remote --exit-code https://github.com/simoleo89/Arcturus-Morningstar-Extended.git "refs/heads/${branch}"; then
            git clone --depth 1 --branch "${branch}" https://github.com/simoleo89/Arcturus-Morningstar-Extended.git .e2e/emulator
          else
            git clone --depth 1 --branch dev https://github.com/duckietm/Arcturus-Morningstar-Extended.git .e2e/emulator
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          cache-dependency-path: .e2e/emulator/Emulator/pom.xml

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: yarn

      - name: Install MariaDB client
        run: sudo apt-get update && sudo apt-get install -y mariadb-client

      - name: Build and start Polaris
        shell: bash
        run: |
          mvn -B -f .e2e/emulator/Emulator/pom.xml package -DskipTests
          bash .e2e/emulator/e2e/prepare-database.sh
          bash .e2e/emulator/e2e/start-emulator.sh

      - name: Install renderer dependencies
        run: yarn install --frozen-lockfile

      - name: Run Messenger scenario
        run: yarn test:e2e:messenger

      - name: Stop Polaris
        if: always()
        shell: bash
        run: |
          if [ -f "${E2E_RUNTIME_DIR}/polaris.pid" ]; then
            kill "$(cat "${E2E_RUNTIME_DIR}/polaris.pid")" || true
          fi
